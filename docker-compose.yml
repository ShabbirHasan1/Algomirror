services:
  # PostgreSQL Database
  postgres:
    image: postgres:18-alpine
    container_name: algomirror_postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-algomirror}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-algomirror}
      - POSTGRES_DB=${POSTGRES_DB:-algomirror}
    volumes:
      - algomirror_pgdata:/var/lib/postgresql/data
    networks:
      - algomirror_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-algomirror}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # AlgoMirror Application
  algomirror:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: algomirror
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      - FLASK_APP=app:create_app
      - FLASK_ENV=production
      - SECRET_KEY=${SECRET_KEY:-change-this-in-production}
      - DATABASE_URL=postgresql://${POSTGRES_USER:-algomirror}:${POSTGRES_PASSWORD:-algomirror}@postgres:5432/${POSTGRES_DB:-algomirror}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - SESSION_TYPE=${SESSION_TYPE:-filesystem}
      - SESSION_COOKIE_SECURE=${SESSION_COOKIE_SECURE:-true}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:8000}
      - DEFAULT_OPENALGO_HOST=${DEFAULT_OPENALGO_HOST:-http://host.docker.internal:5000}
      - DEFAULT_OPENALGO_WS=${DEFAULT_OPENALGO_WS:-ws://host.docker.internal:8765}
      - PING_MONITORING_ENABLED=${PING_MONITORING_ENABLED:-true}
      - PING_MONITORING_INTERVAL=${PING_MONITORING_INTERVAL:-30}
      - PING_MAX_FAILURES=${PING_MAX_FAILURES:-3}
      - PING_QUIET_MODE=${PING_QUIET_MODE:-false}
      - RATE_LIMIT_GLOBAL=${RATE_LIMIT_GLOBAL:-2000}
      - RATE_LIMIT_AUTH=${RATE_LIMIT_AUTH:-30}
      - RATE_LIMIT_API=${RATE_LIMIT_API:-500}
      - RATE_LIMIT_HEAVY=${RATE_LIMIT_HEAVY:-100}
      - TZ=Asia/Kolkata
    volumes:
      # Persist logs
      - algomirror_logs:/app/logs
      # Persist sessions
      - algomirror_sessions:/app/flask_session
    networks:
      - algomirror_network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/auth/login"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Optional: Redis for production rate limiting and sessions
  redis:
    image: redis:7-alpine
    container_name: algomirror_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - algomirror_redis:/data
    networks:
      - algomirror_network
    profiles:
      - with-redis

volumes:
  algomirror_pgdata:
    driver: local
  algomirror_logs:
    driver: local
  algomirror_sessions:
    driver: local
  algomirror_redis:
    driver: local

networks:
  algomirror_network:
    driver: bridge
