<!DOCTYPE html>
<html lang="en" class="theme-loading">
<head>
    <style>
        /* Prevent theme flash on page load */
        .theme-loading { visibility: hidden; }
        .theme-ready { visibility: visible; }
    </style>
    <script>
        (function() {
            // Set theme immediately before any content renders
            var savedTheme = localStorage.getItem('theme') || 'dark';
            document.documentElement.setAttribute('data-theme', savedTheme);
            // Make page visible now that theme is set
            document.documentElement.classList.remove('theme-loading');
            document.documentElement.classList.add('theme-ready');
        })();
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="AlgoMirror - Multi-account OpenAlgo management platform">
    <meta name="csrf-token" content="{{ csrf_token() }}">
    <title>{% block title %}AlgoMirror{% endblock %}</title>

    <!-- Favicon -->
    <link rel="shortcut icon" href="{{ url_for('static', filename='favicon/favicon.ico') }}">
    <link rel="apple-touch-icon" sizes="180x180" href="{{ url_for('static', filename='favicon/apple-touch-icon.png') }}">
    <link rel="icon" type="image/png" sizes="32x32" href="{{ url_for('static', filename='favicon/favicon-32x32.png') }}">
    <link rel="icon" type="image/png" sizes="16x16" href="{{ url_for('static', filename='favicon/favicon-16x16.png') }}">
    <link rel="manifest" href="{{ url_for('static', filename='favicon/site.webmanifest') }}">
    
    <!-- Tailwind CSS with DaisyUI -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/compiled.css') }}">
    
    <!-- Socket.IO -->
    <script src="{{ url_for('static', filename='js/socket.io.min.js') }}"></script>
    
    <!-- CSRF Token Helper -->
    <script>
        function getCSRFToken() {
            const token = document.querySelector('meta[name="csrf-token"]');
            return token ? token.getAttribute('content') : '';
        }

        function fetchWithCSRF(url, options = {}) {
            options.headers = options.headers || {};
            if (options.method && options.method.toUpperCase() !== 'GET') {
                options.headers['X-CSRFToken'] = getCSRFToken();
            }
            return fetch(url, options);
        }
    </script>

    {% if current_user.is_authenticated and current_user.is_admin %}
    <!-- Browser-side error reporter — admin sessions only, throttled, only posts
         once per unique error per page. Server endpoint validates CSRF, level,
         and length-caps every field. -->
    <script>
    (function () {
        'use strict';
        var seen = new Set();
        var posted = 0;
        var MAX_PER_PAGE = 20;

        function postErr(payload) {
            if (posted >= MAX_PER_PAGE) return;
            posted++;
            try {
                fetchWithCSRF('/diagnose/api/errors/client', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'same-origin',
                    body: JSON.stringify(payload),
                }).catch(function () { /* never recurse */ });
            } catch (e) { /* swallow */ }
        }

        function build(level, msg, stack, url) {
            var key = (msg || '').slice(0, 200) + '|' + (url || '');
            if (seen.has(key)) return null;
            seen.add(key);
            return {
                level: level,
                message: (msg || '').slice(0, 2000),
                stack: (stack || '').slice(0, 20000),
                url: (url || location.href || '').slice(0, 2000),
                user_agent: (navigator.userAgent || '').slice(0, 500),
            };
        }

        window.addEventListener('error', function (ev) {
            var p = build('ERROR',
                ev.message || (ev.error && ev.error.message) || 'window.error',
                (ev.error && ev.error.stack) || '',
                ev.filename || location.href);
            if (p) postErr(p);
        });

        window.addEventListener('unhandledrejection', function (ev) {
            var reason = ev.reason;
            var msg = reason ? (reason.message || String(reason)) : 'unhandledrejection';
            var stack = (reason && reason.stack) || '';
            var p = build('ERROR', 'Unhandled promise: ' + msg, stack, location.href);
            if (p) postErr(p);
        });
    })();
    </script>
    {% endif %}

    {% block head %}{% endblock %}
</head>
<body class="bg-base-100 text-base-content">
    {% block layout %}
    <!-- Default layout - child templates should override this block -->
    {% endblock %}
    
    <!-- Toast Container -->
    <div class="toast toast-top toast-end z-50"></div>
    
    <!-- Scripts -->
    <script src="{{ url_for('static', filename='js/theme.js') }}"></script>
    <script src="{{ url_for('static', filename='js/navbar.js') }}"></script>
    
    <script>
        function showToast(message, type = 'info') {
            const toast = document.createElement('div');
            toast.className = `alert alert-${type} shadow-lg`;
            toast.innerHTML = `
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                </svg>
                <span>${message}</span>
            `;
            document.querySelector('.toast').appendChild(toast);
            setTimeout(() => toast.remove(), 5000);
        }
    </script>
</body>
</html>
